<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GOT Password" />
  <title>GOT2000 Password Calculator</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header>
      <p class="eyebrow">GOT2000</p>
      <h1>Password Calculator</h1>
      <p class="subtitle">iPhone · Android · PC</p>
    </header>

    <section class="panel">
      <div class="field-grid">
        <label>
          <span>날짜</span>
          <input id="dateInput" type="date" />
        </label>
        <label>
          <span>시간</span>
          <input id="timeInput" type="time" step="60" />
        </label>
      </div>

      <div class="actions">
        <button id="nowBtn" class="secondary" type="button">현재 시간</button>
        <button id="refreshBtn" class="secondary" type="button">다시 계산</button>
      </div>
    </section>

    <section class="result-card">
      <div>
        <p class="result-label">× 4 Password</p>
        <p id="password4" class="password">—</p>
      </div>
      <button class="copy-btn" type="button" data-copy-target="password4">복사</button>
    </section>

    <section class="result-card">
      <div>
        <p class="result-label">× 7 Password</p>
        <p id="password7" class="password">—</p>
      </div>
      <button class="copy-btn" type="button" data-copy-target="password7">복사</button>
    </section>

    <section class="formula">
      <p><strong>계산식</strong></p>
      <p>(YYYY − DD + HH) × 4</p>
      <p>(YYYY − DD + HH) × 7</p>
    </section>

    <p id="status" class="status" aria-live="polite"></p>

    <footer>
      <p>Safari에서 공유 → 홈 화면에 추가하면 앱처럼 사용할 수 있습니다.</p>
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
